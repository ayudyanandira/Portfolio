<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universitas Brawijaya Feed Designs</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

  <div class="max-w-6xl mx-auto py-12 px-6">

    <h1 class="text-3xl font-bold text-center mb-2">
      Universitas Brawijaya Feed Designs
    </h1>

    <p class="text-center text-slate-500 mb-10">
      A collection of social media designs created for the Instagram feed of Universitas Brawijaya.
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

      <img src="images/wusdawan lama.jpeg" class="rounded-xl shadow hover:shadow-xl transition">
      <img src="images/wisudawan lama2.jpeg" class="rounded-xl shadow hover:shadow-xl transition">
      <img src="images/wisudawan bunga.jpeg" class="rounded-xl shadow hover:shadow-xl transition">
      <img src="images/wisudawan loker.jpeg" class="rounded-xl shadow hover:shadow-xl transition">
      <img src="images/ada wisuda nih.jpeg" class="rounded-xl shadow hover:shadow-xl transition">
      <img src="images/apatte.jpeg" class="rounded-xl shadow hover:shadow-xl transition">
      <img src="images/penetapan ukt.jpeg" class="rounded-xl shadow hover:shadow-xl transition">
      <img src="images/jumat agung.jpeg" class="rounded-xl shadow hover:shadow-xl transition">

    </div>

    <p class="text-center text-slate-500 mb-10">
      For more information, visits @univ.brawijaya
    </p>

  </div>

</body>
</html>
